name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: yarn

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.1.8937393"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Debug APK ──────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Release APK (self-signed) ──────────────────────────────────────────
      # Generates a release keystore on the fly.
      # To use your own key: add KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD,
      # STORE_PASSWORD as GitHub Actions secrets, and swap the keytool step
      # for: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > metro-clock.jks
      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/metro-clock-release.jks \
            -alias metro-clock \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass metroclockpass \
            -keypass metroclockpass \
            -dname "CN=Metro Clock, OU=App, O=MetroOS, L=Unknown, S=Unknown, C=US"

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/metro-clock-release.jks
          KEY_ALIAS: metro-clock
          KEY_PASSWORD: metroclockpass
          STORE_PASSWORD: metroclockpass
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
